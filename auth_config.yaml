# ─────────────────────────────────────────────────────────────

credentials:
  usernames:
    # ── Demo client account ──
    demo_client:
      email: demo@example.com
      name: Demo Client
      # Password: demo123  (change this!)
      password: "$2b$12$OBNhVRjNVJhMVfEZv0f6/OMGPowv2wjlofFSnFQVOl2r2EMo2/Lka"

    # ── Add your real clients below ──
    # client1:
    #   email: client1@theircompany.com
