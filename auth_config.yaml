    #   password: "<hashed_password_from_hash_password.py>"

cookie:
  expiry_days: 7
  key: "churn_predictor_secret_key_change_this"   # ← CHANGE THIS to a random string
  name: churn_auth_cookie

preauthorized:
  emails: []
